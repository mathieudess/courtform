<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CourtForm</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="app-shell">
        <header class="topbar">

                        <circle cx="32" cy="32" r="15" fill="none" stroke="#e05c3b" stroke-width="3.5"></circle>
                        <circle cx="32" cy="32" r="9" fill="none" stroke="#1b7f8f" stroke-width="2"></circle>
                        <circle cx="32" cy="32" r="4" fill="#12201d"></circle>
                    </svg>
                </div>
                <div class="brand-copy">

                    <p>Roundnet court layouts for any field.</p>

            <div class="topbar-actions">

                        <svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true">

                        </svg>
                    </summary>

                    <div class="settings-card">
                        <div class="settings-header">
                            <div>
                                <h2>Court Settings</h2>
                                <p>Adjust only the painted court dimensions here.</p>
                            </div>
                            <button id="resetSettings" class="ghost-button" type="button">Reset defaults</button>
                        </div>

                        <div class="settings-body">
                            <label class="setting-field">
                                <span>Out of bounds radius</span>
                                <input id="courtRadius" type="number" min="1.5" max="12.5" step="0.25" value="8.5"
                                    data-default="8.5" />
                                <small>Default 8.5 m</small>
                            </label>

                            <label class="setting-field">
                                <span>NHZ radius</span>
                                <input id="nhzRadius" type="number" min="0" max="12.5" step="0.01" value="1"
                                    data-default="1" />
                                <small>Default 1.0 m</small>
                            </label>

                            <label class="setting-field">
                                <span>Service line radius</span>
                                <input id="serviceRadius" type="number" min="0" max="12.5" step="0.01" value="2.59"
                                    data-default="2.59" />
                                <small>Default 2.59 m</small>
                            </label>
                        </div>
                    </div>
                </details>
            </div>
        </header>

        <section class="page-grid" aria-label="Roundnet court planner">
            <div class="workspace">
                <section class="panel visual-panel">
                    <div class="visual-heading">
                        <div>
                            <h2>Field layout</h2>
                        </div>
                        <div class="visual-actions">
                            <p class="visual-note">Print view with setup marks.</p>
                            <button id="printLayout" class="ghost-button print-button" type="button">Print layout</button>
                        </div>
                    </div>

                    <div class="legend-strip" aria-label="Court line key">
                        <span class="legend-pill"><span class="legend-swatch field-swatch"></span><span>Field</span></span>
                        <span class="legend-pill"><span class="legend-swatch bounds-swatch"></span><span>Out of bounds</span></span>
                        <span class="legend-pill"><span class="legend-swatch service-swatch"></span><span>Service</span></span>
                        <span class="legend-pill"><span class="legend-swatch nhz-swatch"></span><span>NHZ</span></span>
                    </div>

                    <div class="visual-body">
                        <div class="canvas-wrap">
                            <svg id="courtSvg" role="img" aria-label="Court layout drawing"></svg>
                        </div>

                        <div class="visual-meta">
                            <section class="measurements">
                                <div class="section-heading compact-heading">
                                    <h2>Draw recipe</h2>
                                </div>
                                <div class="recipe-list" id="measurementRows"></div>
                            </section>
                        </div>
                    </div>
                </section>
            </div>

            <aside class="control-rail">
                <section class="panel summary-panel">
                    <div class="summary-heading">
                        <h2>Courts</h2>
                    </div>

                    <label class="field field-priority">
                        <span>Min center distance</span>
                        <output id="centerDistanceValue">12 m</output>
                        <input id="centerDistance" type="range" min="11" max="18" value="12" step="0.1" />
                    </label>

                    <div class="court-hero">
                        <span class="hero-value" id="courtCount">0</span>
                        <span class="hero-label">courts</span>
                        <p class="hero-note" id="bestLayoutValue">Best layout</p>
                    </div>

                    <div class="stats" aria-label="Layout summary">
                        <div>
                            <span class="stat-value" id="overlapValue">0%</span>
                            <span class="stat-label">overlap</span>
                        </div>
                        <div>
                            <span class="stat-value" id="minSpacingValue">-</span>
                            <span class="stat-label">min spacing</span>
                        </div>
                    </div>
                </section>

                <section class="panel mode-panel" aria-label="Layout choice">
                    <div class="section-heading">
                        <h2>Mode</h2>
                    </div>

                    <fieldset class="layout-picker" aria-label="Layout">
                        <div class="layout-options">
                            <label class="layout-option" id="layoutOptionGrid" title="Grid">
                                <input id="layoutGrid" type="radio" name="layoutOption" value="grid" />
                                <svg class="layout-icon" viewBox="0 0 40 40" aria-hidden="true">
                                    <circle cx="10" cy="10" r="3" />
                                    <circle cx="20" cy="10" r="3" />
                                    <circle cx="30" cy="10" r="3" />
                                    <circle cx="10" cy="20" r="3" />
                                    <circle cx="20" cy="20" r="3" />
                                    <circle cx="30" cy="20" r="3" />
                                    <circle cx="10" cy="30" r="3" />
                                    <circle cx="20" cy="30" r="3" />
                                    <circle cx="30" cy="30" r="3" />
                                </svg>
                                <span class="layout-name">Grid</span>
                                <span class="best-badge">Best</span>
                            </label>

                            <label class="layout-option" id="layoutOptionHexWidth" title="Hex rows across width">
                                <input id="layoutHexWidth" type="radio" name="layoutOption" value="hex_width" checked />
                                <svg class="layout-icon" viewBox="0 0 40 40" aria-hidden="true">
                                    <circle cx="9" cy="11" r="3" />
                                    <circle cx="21" cy="11" r="3" />
                                    <circle cx="33" cy="11" r="3" />
                                    <circle cx="15" cy="21" r="3" />
                                    <circle cx="27" cy="21" r="3" />
                                    <circle cx="9" cy="31" r="3" />
                                    <circle cx="21" cy="31" r="3" />
                                    <circle cx="33" cy="31" r="3" />
                                </svg>
                                <span class="layout-name">Rows</span>
                                <span class="best-badge">Best</span>
                            </label>

                            <label class="layout-option" id="layoutOptionHexLength" title="Hex columns up length">
                                <input id="layoutHexLength" type="radio" name="layoutOption" value="hex_length" />
                                <svg class="layout-icon" viewBox="0 0 40 40" aria-hidden="true">
                                    <circle cx="11" cy="9" r="3" />
                                    <circle cx="11" cy="21" r="3" />
                                    <circle cx="11" cy="33" r="3" />
                                    <circle cx="21" cy="15" r="3" />
                                    <circle cx="21" cy="27" r="3" />
                                    <circle cx="31" cy="9" r="3" />
                                    <circle cx="31" cy="21" r="3" />
                                    <circle cx="31" cy="33" r="3" />
                                </svg>
                                <span class="layout-name">Columns</span>
                                <span class="best-badge">Best</span>
                            </label>
                        </div>
                    </fieldset>
                </section>

                <section class="panel controls-panel" aria-label="Layout controls">
                    <div class="section-heading">
                        <h2>Field</h2>
                    </div>

                    <div class="control-grid">
                        <label class="field">
                            <span>Field width</span>
                            <output id="fieldWidthValue">40 m</output>
                            <input id="fieldWidth" type="range" min="10" max="90" value="40" step="1" />
                        </label>

                        <label class="field">
                            <span>Field length</span>
                            <output id="fieldLengthValue">60 m</output>
                            <input id="fieldLength" type="range" min="10" max="120" value="60" step="1" />
                        </label>

                        <label class="field field-secondary">
                            <span>Sideline margin</span>
                            <output id="marginValue">0 m</output>
                            <input id="margin" type="range" min="0" max="10" value="0" step="0.5" data-default="0" />
                        </label>
                    </div>
                </section>
            </aside>
        </section>
    </main>

    <script>
        const stateIds = [
            "fieldWidth",
            "fieldLength",
            "courtRadius",
            "nhzRadius",
            "serviceRadius",
            "centerDistance",
            "margin",
            "layoutGrid",
            "layoutHexWidth",
            "layoutHexLength",
        ];

        const layoutOptions = ["grid", "hex_width", "hex_length"];
        const layoutLabels = {
            grid: "Grid",
            hex_width: "Rows",
            hex_length: "Columns",
        };
        const epsilon = 0.001;
        const layoutNodeIds = {
            grid: "layoutOptionGrid",
            hex_width: "layoutOptionHexWidth",
            hex_length: "layoutOptionHexLength",
        };
        const layoutInputIds = {
            grid: "layoutGrid",
            hex_width: "layoutHexWidth",
            hex_length: "layoutHexLength",
        };
        const settingsFieldIds = ["courtRadius", "nhzRadius", "serviceRadius"];

        function byId(nodeId) {
            return document.getElementById(nodeId);
        }

        function fmt(value) {
            return Math.abs(value - Math.round(value)) < 0.001 ? String(Math.round(value)) : value.toFixed(1);
        }

        function fmtPercent(value) {
            return `${(value * 100).toFixed(1)}%`;
        }

        function selectedLayoutOption() {
            return document.querySelector('input[name="layoutOption"]:checked')?.value ?? "hex_width";
        }

        function applyLayoutOption(state, option) {
            state.layout_option = option;
            if (option === "grid") {
                state.mode = "grid";
                state.hex_orientation = "width";
            } else if (option === "hex_length") {
                state.mode = "hex";
                state.hex_orientation = "length";
            } else {
                state.mode = "hex";
                state.hex_orientation = "width";
            }
            return state;
        }

        function readState() {
            return applyLayoutOption(
                {
                    field_width: Number(byId("fieldWidth").value),
                    field_length: Number(byId("fieldLength").value),
                    radius: Number(byId("courtRadius").value),
                    nhz_radius: Number(byId("nhzRadius").value),
                    service_radius: Number(byId("serviceRadius").value),
                    distance: Number(byId("centerDistance").value),
                    margin: Number(byId("margin").value),
                },
                selectedLayoutOption(),
            );
        }

        function fitCount(span, gap, offset = 0) {
            if (gap <= 0) {
                return 1;
            }
            const remaining = span - offset;
            if (remaining < -epsilon) {
                return 0;
            }
            return Math.floor((remaining + epsilon) / gap) + 1;
        }

        function hexCandidateGaps(width, length, distance) {
            const maxCols = Math.max(1, Math.floor(width / distance) + 1);
            if (maxCols <= 1) {
                return [0];
            }

            const gaps = new Set([distance]);
            for (let cols = 2; cols <= maxCols; cols += 1) {
                gaps.add(width / (cols - 1));
                gaps.add(width / (cols - 0.5));
            }

            const maxRows = Math.max(1, Math.floor(length / Math.max(distance / 2, epsilon)) + 1);
            for (let rows = 2; rows <= maxRows; rows += 1) {
                const targetGap = length / (rows - 1);
                if (targetGap > 0 && targetGap < distance) {
                    gaps.add(2 * Math.sqrt(Math.max(0, distance * distance - targetGap * targetGap)));
                }
            }

            return [...gaps].filter((gap) => gap >= distance - epsilon && gap <= width + epsilon).sort((a, b) => a - b);
        }

        function hexMetricsForGap(width, length, distance, xGap) {
            if (xGap <= 0) {
                const rows = Math.max(1, Math.floor(length / distance) + 1);
                const yGap = rows > 1 ? length / (rows - 1) : 0;
                return { even_cols: 1, odd_cols: 1, rows, x_gap: 0, y_gap: yGap, count: rows, min_nearest: rows > 1 ? yGap : Infinity };
            }

            const evenCols = Math.max(1, fitCount(width, xGap));
            const oddCols = Math.max(0, fitCount(width, xGap, xGap / 2));
            const minRowGap = Math.max(distance / 2, Math.sqrt(Math.max(0, distance * distance - (xGap / 2) ** 2)));
            const rows = Math.max(1, Math.floor((length + epsilon) / minRowGap) + 1);
            const yGap = rows > 1 ? length / (rows - 1) : 0;
            const evenRows = Math.floor((rows + 1) / 2);
            const oddRows = Math.floor(rows / 2);
            const count = evenRows * evenCols + oddRows * oddCols;
            const nearestCandidates = [];
            if (evenCols > 1) nearestCandidates.push(xGap);
            if (rows > 1) nearestCandidates.push(Math.hypot(xGap / 2, yGap));
            const minNearest = nearestCandidates.length ? Math.min(...nearestCandidates) : Infinity;

            return { even_cols: evenCols, odd_cols: oddCols, rows, x_gap: xGap, y_gap: yGap, count, min_nearest: minNearest };
        }

        function hexMetrics(width, length, distance) {
            return hexCandidateGaps(width, length, distance)
                .map((gap) => hexMetricsForGap(width, length, distance, gap))
                .sort((a, b) =>
                    b.even_cols - a.even_cols ||
                    b.count - a.count ||
                    b.min_nearest - a.min_nearest ||
                    b.x_gap - a.x_gap ||
                    b.y_gap - a.y_gap
                )[0];
        }

        function layoutRecipe(state) {
            const centerInset = state.margin + state.radius;
            const usableW = Math.max(0, state.field_width - 2 * centerInset);
            const usableL = Math.max(0, state.field_length - 2 * centerInset);

            if (state.mode === "grid") {
                const cols = Math.max(1, Math.floor(usableW / state.distance) + 1);
                const rows = Math.max(1, Math.floor(usableL / state.distance) + 1);
                const xGap = cols > 1 ? usableW / (cols - 1) : 0;
                const yGap = rows > 1 ? usableL / (rows - 1) : 0;
                const xStart = cols > 1 ? centerInset : centerInset + usableW / 2;
                const yStart = rows > 1 ? centerInset : centerInset + usableL / 2;
                return [
                    ["First center", `${fmt(xStart)} m, ${fmt(yStart)} m`],
                    ["Repeat across", xGap],
                    ["Repeat up", yGap],
                ];
            }

            if (state.hex_orientation === "length") {
                const metrics = hexMetrics(usableL, usableW, state.distance);
                const repeatUp = metrics.x_gap;
                const repeatAcross = metrics.y_gap;
                const firstCol = metrics.rows > 1 ? centerInset : centerInset + usableW / 2;
                const firstY = metrics.even_cols > 1 ? centerInset : centerInset + usableL / 2;
                const secondCol = metrics.rows > 1 ? firstCol + repeatAcross : firstCol;
                const secondColY = metrics.even_cols > 1 ? firstY + repeatUp / 2 : firstY;
                return [
                    ["First center", `${fmt(firstCol)} m, ${fmt(firstY)} m`],
                    ["Second anchor", `${fmt(secondCol)} m, ${fmt(secondColY)} m`],
                    ["Repeat across", repeatAcross],
                    ["Repeat up", repeatUp],
                ];
            }

            const metrics = hexMetrics(usableW, usableL, state.distance);
            const xGap = metrics.x_gap;
            const yGap = metrics.y_gap;
            const repeatAcross = xGap ? xGap / 2 : 0;
            const xStart = metrics.even_cols > 1 ? centerInset : centerInset + usableW / 2;
            const yStart = metrics.rows > 1 ? centerInset : centerInset + usableL / 2;
            const secondRowX = metrics.even_cols > 1 ? xStart + xGap / 2 : xStart;
            const secondRow = metrics.rows > 1 ? yStart + yGap : yStart;
            return [
                ["First center", `${fmt(xStart)} m, ${fmt(yStart)} m`],
                ["Second anchor", `${fmt(secondRowX)} m, ${fmt(secondRow)} m`],
                ["Repeat across", repeatAcross],
                ["Repeat up", yGap],
            ];
        }

        function layoutGuides(state) {
            const centerInset = state.margin + state.radius;
            const usableW = Math.max(0, state.field_width - 2 * centerInset);
            const usableL = Math.max(0, state.field_length - 2 * centerInset);

            if (state.mode === "grid") {
                const cols = Math.max(1, Math.floor(usableW / state.distance) + 1);
                const rows = Math.max(1, Math.floor(usableL / state.distance) + 1);
                const xGap = cols > 1 ? usableW / (cols - 1) : 0;
                const yGap = rows > 1 ? usableL / (rows - 1) : 0;
                const xStart = cols > 1 ? centerInset : centerInset + usableW / 2;
                const yStart = rows > 1 ? centerInset : centerInset + usableL / 2;
                return [
                    { axis: "x", track: 0, from: 0, to: xStart, label: `${xStart.toFixed(2)} m`, value: xStart, targets: [{ x: xStart, y: yStart }] },
                    { axis: "y", track: 0, from: 0, to: yStart, label: `${yStart.toFixed(2)} m`, value: yStart, targets: [{ x: xStart, y: yStart }] },
                    { axis: "x", track: 1, from: xStart, to: xStart + xGap, label: `${xGap.toFixed(2)} m`, value: xGap, targets: [{ x: xStart, y: yStart }, { x: xStart + xGap, y: yStart }] },
                    { axis: "y", track: 1, from: yStart, to: yStart + yGap, label: `${yGap.toFixed(2)} m`, value: yGap, targets: [{ x: xStart, y: yStart }, { x: xStart, y: yStart + yGap }] },
                ];
            }

            if (state.hex_orientation === "length") {
                const metrics = hexMetrics(usableL, usableW, state.distance);
                const repeatUp = metrics.x_gap;
                const repeatAcross = metrics.y_gap;
                const xStart = metrics.rows > 1 ? centerInset : centerInset + usableW / 2;
                const yStart = metrics.even_cols > 1 ? centerInset : centerInset + usableL / 2;
                const secondCol = metrics.rows > 1 ? xStart + repeatAcross : xStart;
                const secondColY = metrics.even_cols > 1 ? yStart + repeatUp / 2 : yStart;
                return [
                    { axis: "x", track: 0, from: 0, to: xStart, label: `${xStart.toFixed(2)} m`, value: xStart, targets: [{ x: xStart, y: yStart }] },
                    { axis: "y", track: 0, from: 0, to: yStart, label: `${yStart.toFixed(2)} m`, value: yStart, targets: [{ x: xStart, y: yStart }] },
                    { axis: "x", track: 1, from: 0, to: secondCol, label: `${secondCol.toFixed(2)} m`, value: secondCol, targets: [{ x: secondCol, y: secondColY }] },
                    { axis: "y", track: 1, from: 0, to: secondColY, label: `${secondColY.toFixed(2)} m`, value: secondColY, targets: [{ x: secondCol, y: secondColY }] },
                    { axis: "x", track: 2, from: xStart, to: xStart + repeatAcross, label: `${repeatAcross.toFixed(2)} m`, value: repeatAcross, targets: [{ x: xStart, y: yStart }, { x: xStart + repeatAcross, y: yStart }] },
                    { axis: "y", track: 2, from: yStart, to: yStart + repeatUp, label: `${repeatUp.toFixed(2)} m`, value: repeatUp, targets: [{ x: xStart, y: yStart }, { x: xStart, y: yStart + repeatUp }] },
                ];
            }

            const metrics = hexMetrics(usableW, usableL, state.distance);
            const xGap = metrics.x_gap;
            const yGap = metrics.y_gap;
            const repeatAcross = xGap ? xGap / 2 : 0;
            const xStart = metrics.even_cols > 1 ? centerInset : centerInset + usableW / 2;
            const yStart = metrics.rows > 1 ? centerInset : centerInset + usableL / 2;
            const secondRowX = metrics.even_cols > 1 ? xStart + xGap / 2 : xStart;
            const secondRow = metrics.rows > 1 ? yStart + yGap : yStart;
            return [
                { axis: "x", track: 0, from: 0, to: xStart, label: `${xStart.toFixed(2)} m`, value: xStart, targets: [{ x: xStart, y: yStart }] },
                { axis: "y", track: 0, from: 0, to: yStart, label: `${yStart.toFixed(2)} m`, value: yStart, targets: [{ x: xStart, y: yStart }] },
                { axis: "x", track: 1, from: 0, to: secondRowX, label: `${secondRowX.toFixed(2)} m`, value: secondRowX, targets: [{ x: secondRowX, y: secondRow }] },
                { axis: "y", track: 1, from: 0, to: secondRow, label: `${secondRow.toFixed(2)} m`, value: secondRow, targets: [{ x: secondRowX, y: secondRow }] },
                { axis: "x", track: 2, from: xStart, to: secondRowX, label: `${repeatAcross.toFixed(2)} m`, value: repeatAcross, targets: [{ x: xStart, y: yStart }, { x: secondRowX, y: secondRow }] },
                { axis: "y", track: 2, from: yStart, to: yStart + yGap, label: `${yGap.toFixed(2)} m`, value: yGap, targets: [{ x: xStart, y: yStart }, { x: xStart, y: yStart + yGap }] },
            ];
        }

        function generateGrid(width, length, distance, margin) {
            if (width <= 0 || length <= 0) {
                return [];
            }
            const cols = Math.max(1, Math.floor(width / distance) + 1);
            const rows = Math.max(1, Math.floor(length / distance) + 1);
            const xGap = cols > 1 ? width / (cols - 1) : 0;
            const yGap = rows > 1 ? length / (rows - 1) : 0;
            const x0 = cols > 1 ? margin : margin + width / 2;
            const y0 = rows > 1 ? margin : margin + length / 2;
            const centers = [];
            for (let row = 0; row < rows; row += 1) {
                for (let col = 0; col < cols; col += 1) {
                    centers.push([x0 + col * xGap, y0 + row * yGap]);
                }
            }
            return centers;
        }

        function generateHex(width, length, distance, margin) {
            if (width <= 0 || length <= 0) {
                return [];
            }
            const metrics = hexMetrics(width, length, distance);
            const evenCols = metrics.even_cols;
            const xGap = metrics.x_gap;
            const rows = metrics.rows;
            const yGap = metrics.y_gap;
            const y0 = rows > 1 ? margin : margin + length / 2;
            const centers = [];

            for (let row = 0; row < rows; row += 1) {
                const offset = row % 2 && evenCols > 1 ? xGap / 2 : 0;
                const cols = xGap ? fitCount(width, xGap, offset) : 1;
                if (cols <= 0) continue;
                const x0 = xGap ? margin + offset : margin + width / 2;
                const y = y0 + row * yGap;
                for (let col = 0; col < cols; col += 1) {
                    const x = x0 + col * xGap;
                    if (x >= margin - 0.001 && x <= margin + width + 0.001) {
                        centers.push([x, y]);
                    }
                }
            }
            return centers;
        }

        function generateHexAlongLength(width, length, distance, margin) {
            return generateHex(length, width, distance, 0)
                .map(([x, y]) => [margin + y, margin + x])
                .sort((a, b) => a[1] - b[1] || a[0] - b[0]);
        }

        function generateHexOriented(width, length, distance, margin, orientation) {
            return orientation === "length"
                ? generateHexAlongLength(width, length, distance, margin)
                : generateHex(width, length, distance, margin);
        }

        function generateLayoutOption(width, length, distance, margin, option) {
            if (option === "grid") {
                return generateGrid(width, length, distance, margin);
            }
            return generateHexOriented(width, length, distance, margin, option === "hex_length" ? "length" : "width");
        }

        function nearestDistances(centers) {
            return centers.map(([x1, y1], i) => {
                let nearest = null;
                centers.forEach(([x2, y2], j) => {
                    if (i === j) return;
                    const dist = Math.hypot(x1 - x2, y1 - y2);
                    nearest = nearest === null ? dist : Math.min(nearest, dist);
                });
                return nearest;
            });
        }

        function circleIntersectionArea(radius, distance) {
            if (radius <= 0 || distance >= 2 * radius) return 0;
            if (distance <= 0) return Math.PI * radius * radius;
            return 2 * radius * radius * Math.acos(distance / (2 * radius))
                - 0.5 * distance * Math.sqrt(Math.max(0, 4 * radius * radius - distance * distance));
        }

        function overlapAreaRatio(centers, radius) {
            if (radius <= 0 || !centers.length) return 0;
            let overlapArea = 0;
            for (let i = 0; i < centers.length; i += 1) {
                const [x1, y1] = centers[i];
                for (let j = i + 1; j < centers.length; j += 1) {
                    const [x2, y2] = centers[j];
                    overlapArea += circleIntersectionArea(radius, Math.hypot(x1 - x2, y1 - y2));
                }
            }
            const totalArea = centers.length * Math.PI * radius * radius;
            return totalArea ? overlapArea / totalArea : 0;
        }

        function rankLayoutOptions(width, length, distance, margin, radius) {
            return layoutOptions
                .map((option, order) => {
                    const centers = generateLayoutOption(width, length, distance, margin, option);
                    return { option, centers, count: centers.length, overlap: overlapAreaRatio(centers, radius), order };
                })
                .sort((a, b) => b.count - a.count || a.overlap - b.overlap || a.order - b.order);
        }

        function svgNode(name, attrs) {
            const node = document.createElementNS("http://www.w3.org/2000/svg", name);
            Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
            return node;
        }

        function addGuide(svg, guide, originX, originY, fieldLength) {
            const track = guide.track;
            const trackOffset = 1.1 + track * 1.4;
            let x1;
            let x2;
            let y1;
            let y2;
            let labelX;
            let labelY;

            if (guide.axis === "x") {
                x1 = originX + guide.from;
                x2 = originX + guide.to;
                y1 = originY + fieldLength + trackOffset;
                y2 = y1;
                labelX = (x1 + x2) / 2;
                labelY = y1 + 0.95;
            } else {
                x1 = originX - trackOffset;
                x2 = x1;
                y1 = originY + fieldLength - guide.from;
                y2 = originY + fieldLength - guide.to;
                labelX = x1 - 0.65;
                labelY = (y1 + y2) / 2;
            }

            svg.appendChild(svgNode("line", { x1, y1, x2, y2, class: `guide-line guide-track-${track}` }));

            (guide.targets ?? []).forEach((target) => {
                const attrs = guide.axis === "x"
                    ? { x1: originX + target.x, y1: originY + fieldLength, x2: originX + target.x, y2: originY + fieldLength - target.y }
                    : { x1: originX, y1: originY + fieldLength - target.y, x2: originX + target.x, y2: originY + fieldLength - target.y };
                svg.appendChild(svgNode("line", { ...attrs, class: `guide-projection guide-track-${track}` }));
            });

            const label = svgNode("text", {
                x: labelX,
                y: labelY,
                class: `guide-label guide-label-${guide.axis} guide-track-${track}`,
                "text-anchor": "middle",
            });
            label.textContent = guide.label;
            svg.appendChild(label);

            [[x1, y1], [x2, y2]].forEach(([cx, cy]) => {
                svg.appendChild(svgNode("circle", { cx, cy, r: 0.14, class: "guide-point" }));
            });
        }

        function drawSvg(state, centers) {
            const svg = byId("courtSvg");
            svg.replaceChildren();

            const width = state.field_width;
            const length = state.field_length;
            const radius = state.radius;
            const margin = state.margin;
            const centerInset = margin + radius;
            const base = Math.max(width, length);
            const padLeft = Math.max(7.8, base * 0.1);
            const padRight = Math.max(2.8, base * 0.04);
            const padTop = Math.max(4.2, base * 0.06);
            const padBottom = Math.max(7.4, base * 0.095);
            const viewW = width + padLeft + padRight;
            const viewL = length + padTop + padBottom;
            svg.setAttribute("viewBox", `0 0 ${viewW} ${viewL}`);

            svg.appendChild(svgNode("rect", {
                x: padLeft,
                y: padTop,
                width,
                height: length,
                rx: 0.45,
                class: "field-rect",
            }));

            if (centerInset > 0) {
                const usableW = Math.max(0, width - 2 * centerInset);
                const usableL = Math.max(0, length - 2 * centerInset);
                svg.appendChild(svgNode("rect", {
                    x: padLeft + centerInset,
                    y: padTop + centerInset,
                    width: usableW,
                    height: usableL,
                    class: "usable-rect",
                }));
            }

            layoutGuides(state).forEach((guide) => addGuide(svg, guide, padLeft, padTop, length));

            centers.forEach(([x, y], index) => {
                const cx = padLeft + x;
                const cy = padTop + length - y;
                svg.appendChild(svgNode("circle", { cx, cy, r: radius, class: "court-circle" }));

                [
                    [state.service_radius, "service-circle"],
                    [state.nhz_radius, "nhz-circle"],
                ].forEach(([ringRadius, ringClass]) => {
                    if (ringRadius > 0) {
                        svg.appendChild(svgNode("circle", { cx, cy, r: ringRadius, class: `court-ring ${ringClass}` }));
                    }
                });

                svg.appendChild(svgNode("circle", {
                    cx,
                    cy,
                    r: Math.max(0.14, Math.min(width, length) * 0.006),
                    class: "center-dot",
                }));

                const label = svgNode("text", {
                    x: cx,
                    y: cy - Math.max(0.35, radius * 0.16),
                    class: "center-label",
                    "text-anchor": "middle",
                });
                label.textContent = String(index + 1);
                svg.appendChild(label);
            });

            [
                [padLeft + width / 2, padTop - Math.min(1.25, padTop * 0.28), `${fmt(width)} m`],
                [padLeft - Math.min(1.85, padLeft * 0.24), padTop + length / 2, `${fmt(length)} m`],
            ].forEach(([x, y, text]) => {
                const label = svgNode("text", { x, y, class: "dimension-label", "text-anchor": "middle" });
                label.textContent = text;
                svg.appendChild(label);
            });
        }

        function renderRecipe(state) {
            const body = byId("measurementRows");
            body.replaceChildren();
            layoutRecipe(state).forEach(([label, value]) => {
                const row = document.createElement("div");
                row.className = "recipe-row";
                const text = document.createElement("div");
                text.className = "recipe-label";
                text.textContent = label;
                const val = document.createElement("div");
                val.className = "recipe-value";
                val.textContent = typeof value === "string" ? value : (value > 0 ? `${fmt(value)} m` : "-");
                row.append(text, val);
                body.appendChild(row);
            });
        }

        function resetSettings() {
            settingsFieldIds.forEach((nodeId) => {
                const node = byId(nodeId);
                node.value = node.dataset.default;
            });
            render();
        }

        function printLayout() {
            window.print();
        }

        function updateLayoutChoices(selectedOption, bestOption) {
            layoutOptions.forEach((option) => {
                const node = byId(layoutNodeIds[option]);
                const isSelected = option === selectedOption;
                const isBest = option === bestOption;
                node.classList.toggle("is-selected", isSelected);
                node.classList.toggle("is-best", isBest);
                node.setAttribute("aria-current", isSelected ? "true" : "false");
            });
        }

        function render() {
            const state = readState();
            const centerInset = state.margin + state.radius;
            const usableW = Math.max(0, state.field_width - 2 * centerInset);
            const usableL = Math.max(0, state.field_length - 2 * centerInset);
            const rankedLayouts = rankLayoutOptions(usableW, usableL, state.distance, centerInset, state.radius);
            const bestLayout = rankedLayouts[0];
            const centers = generateLayoutOption(usableW, usableL, state.distance, centerInset, state.layout_option);
            const nearest = nearestDistances(centers);
            const overlap = overlapAreaRatio(centers, state.radius);
            const actualSpacing = nearest.filter((distance) => distance !== null).reduce((min, value) => Math.min(min, value), Infinity);

            byId("fieldWidthValue").textContent = `${fmt(state.field_width)} m`;
            byId("fieldLengthValue").textContent = `${fmt(state.field_length)} m`;
            byId("centerDistanceValue").textContent = `${fmt(state.distance)} m`;
            byId("marginValue").textContent = `${fmt(state.margin)} m`;
            byId("courtCount").textContent = String(centers.length);
            byId("overlapValue").textContent = fmtPercent(overlap);
            byId("minSpacingValue").textContent = actualSpacing === Infinity ? "-" : `${fmt(actualSpacing)} m`;
            byId("bestLayoutValue").textContent = `Best: ${layoutLabels[bestLayout.option]} · ${bestLayout.count}`;
            updateLayoutChoices(state.layout_option, bestLayout.option);

            drawSvg(state, centers);
            renderRecipe(state);
        }

        stateIds.forEach((nodeId) => {
            const eventName = Object.values(layoutInputIds).includes(nodeId) ? "change" : "input";
            byId(nodeId).addEventListener(eventName, render);
        });

        byId("resetSettings").addEventListener("click", resetSettings);
        byId("printLayout").addEventListener("click", printLayout);
        render();
    </script>
</body>

</html>
